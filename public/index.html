<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outbound Team Capacity Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      max-height: 100vh;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    body {
      display: grid;
      grid-template-rows: 48px 30px 110px 170px 80px 1fr;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
      background: #0a0d14;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
    }

    /* ── Row 1: Header (48px) ──────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      background: #0d1017;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      min-height: 0;
      overflow: hidden;
    }

    .hdr-title {
      font-size: 13px;
      font-weight: 700;
      color: #e2e8f0;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: .02em;
    }

    #header-book-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(99,153,34,0.15);
      border: 0.5px solid rgba(99,153,34,0.4);
      border-radius: 6px;
      padding: 4px 14px;
      flex: 1;
      min-width: 0;
      max-width: 580px;
      white-space: nowrap;
      overflow: hidden;
      visibility: hidden;
    }
    #header-book-pill .bp-label  { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: .06em; flex-shrink: 0; }
    #header-book-pill .bp-count  { font-size: 26px; font-weight: 800; color: #86efac; flex-shrink: 0; line-height: 1; }
    #header-book-pill .bp-unit   { font-size: 11px; font-weight: 600; color: #86efac; flex-shrink: 0; }
    #header-book-pill .bp-sep    { width: 1px; height: 20px; background: rgba(99,153,34,0.4); flex-shrink: 0; margin: 0 4px; }
    #header-book-pill .bp-detail { font-size: 10px; color: #64748b; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    #header-book-pill .bp-detail strong { color: #e2e8f0; }

    .hdr-right {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .live-ind {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      color: #22c55e;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: live-pulse 1.5s ease-in-out infinite;
    }

    @keyframes live-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(1.65); box-shadow: 0 0 14px #22c55e; }
    }

    .cd-wrap  { display: flex; align-items: center; gap: 6px; }
    .cd-track { width: 60px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .cd-fill  { height: 100%; background: #3b82f6; border-radius: 2px; transition: width 1s linear; width: 100%; }
    .cd-text  { font-size: 10px; color: #64748b; min-width: 26px; }

    #last-updated { font-size: 10px; color: #64748b; }

    /* ── Row 2: Glance bar (30px) ──────────────────────────────────────────── */
    #glance-bar {
      display: flex;
      align-items: center;
      padding: 0 18px;
      background: #0b0e15;
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: #64748b;
      overflow: hidden;
      white-space: nowrap;
      min-height: 0;
      gap: 0;
    }

    .gb-title {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #475569;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .wg-sep  { width: 0.5px; height: 14px; background: rgba(255,255,255,0.06); margin: 0 10px; flex-shrink: 0; display: inline-block; vertical-align: middle; }
    .wg-item { flex-shrink: 0; }
    .wg-week { margin-left: auto; font-size: 10px; color: #475569; flex-shrink: 0; padding-left: 14px; }

    /* ── Row 3: Module 1 bar chart (110px) ─────────────────────────────────── */
    #m1-row {
      display: grid;
      grid-template-columns: 60px 1fr;
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
      min-height: 0;
      overflow: hidden;
      background: #0a0d14;
    }

    #m1-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border-right: 0.5px solid rgba(255,255,255,0.06);
      min-height: 0;
      gap: 4px;
    }

    .badge-m {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 9px;
      font-weight: 700;
      color: #64748b;
      letter-spacing: .04em;
    }

    .m1-sub {
      font-size: 7.5px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #475569;
      line-height: 1.3;
      text-align: center;
    }

    #m1-chart-wrap {
      padding: 6px 10px 4px 6px;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }
    #m1-chart-wrap canvas { width: 100% !important; height: 100% !important; }

    /* ── Row 4: Module 2 heatmap (170px) ───────────────────────────────────── */
    #m2-row {
      display: flex;
      flex-direction: column;
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
      min-height: 0;
      overflow: hidden;
    }

    .row-hdr {
      height: 16px;
      line-height: 16px;
      padding: 0 16px;
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #475569;
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      background: #0d1017;
    }

    #m2-heatmap {
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* Heatmap — 10px font, 4px padding */
    #m2-heatmap .heatmap-table        { font-size: 10px; border-collapse: collapse; width: 100%; table-layout: fixed; }
    #m2-heatmap .heatmap-table th     { font-size: 9px; padding: 0 4px; height: 20px; background: #0d1017; border-bottom: 0.5px solid rgba(255,255,255,0.07); white-space: nowrap; text-align: center; overflow: hidden; color: #64748b; }
    #m2-heatmap .heatmap-table th.rep-col { text-align: left; width: 100px; padding-left: 10px; position: sticky; left: 0; z-index: 2; background: #0d1017; }
    #m2-heatmap tr                    { height: 20px; }
    #m2-heatmap .hm-cell              { padding: 0 4px; line-height: 1; text-align: center; border: 0.5px solid rgba(0,0,0,.12); vertical-align: middle; overflow: hidden; }
    #m2-heatmap .hm-booking           { font-size: 9.5px; font-weight: 700; }
    #m2-heatmap .hm-pct               { font-size: 8px; opacity: .9; }
    #m2-heatmap td.rep-name           { font-size: 9.5px; font-weight: 600; width: 100px; padding: 0 6px 0 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: sticky; left: 0; z-index: 1; background: #0a0d14; border-right: 0.5px solid rgba(255,255,255,0.07); color: #e2e8f0; }
    #m2-heatmap tr:hover td.rep-name  { background: #111827; }
    #m2-heatmap .hm-total-col         { font-size: 9.5px; padding: 0 8px; text-align: center; border-left: 0.5px solid rgba(255,255,255,0.08); }
    #m2-heatmap .weekend-col          { opacity: 0.2; background: rgba(139,148,158,0.05) !important; }
    #m2-heatmap .today-col            { outline: 1.5px solid #3b82f6; outline-offset: -1px; }

    /* Cell fill scale */
    .hm-empty { background: rgba(220,38,38,0.45); color: #fca5a5; }
    .hm-low   { background: rgba(220,38,38,0.25); color: #fca5a5; }
    .hm-mid   { background: rgba(245,158,11,0.28); color: #fcd34d; }
    .hm-good  { background: rgba(34,197,94,0.22);  color: #86efac; }
    .hm-full  { background: rgba(34,197,94,0.45);  color: #86efac; }

    /* ── Row 5: Module 4 — 4-card horizontal strip (80px) ──────────────────── */
    #m4-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
      min-height: 0;
      overflow: hidden;
      background: #0a0d14;
      align-items: stretch;
    }

    .m4-card {
      background: rgba(255,255,255,0.03);
      border: 0.5px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 0;
      overflow: hidden;
    }

    .m4-card-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 6px;
    }

    .m4-horizon {
      font-size: 13px;
      font-weight: 700;
      color: #e2e8f0;
      white-space: nowrap;
    }

    .m4-dayrange {
      font-size: 9px;
      color: #475569;
      white-space: nowrap;
    }

    .m4-card-mid {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .m4-open-num {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
      flex-shrink: 0;
    }
    .m4-open-num.critical { color: #fca5a5; }
    .m4-open-num.warn     { color: #fcd34d; }
    .m4-open-num.good     { color: #86efac; }

    .m4-fill-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .m4-fill-label {
      font-size: 9px;
      color: #64748b;
    }

    .m4-fill-bar-track {
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      overflow: hidden;
    }

    .m4-fill-bar { height: 100%; border-radius: 3px; }

    .m4-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .m4-badge.badge-critical { background: rgba(220,38,38,0.20);  color: #fca5a5; border: 0.5px solid rgba(220,38,38,0.35); }
    .m4-badge.badge-warn     { background: rgba(245,158,11,0.20); color: #fcd34d; border: 0.5px solid rgba(245,158,11,0.35); }
    .m4-badge.badge-good     { background: rgba(34,197,94,0.20);  color: #86efac; border: 0.5px solid rgba(34,197,94,0.35); }

    /* ── Row 6: Module 3 — full-width hit rate table (1fr) ─────────────────── */
    #m3-row {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      background: #0a0d14;
    }

    #m3-scroll {
      flex: 1;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #m3-row table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    #m3-row th {
      font-size: 8.5px;
      padding: 0 10px;
      height: 20px;
      text-align: left;
      color: #64748b;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 0.5px solid rgba(255,255,255,0.07);
      background: #0d1017;
    }

    #m3-row td {
      padding: 0 10px;
      height: 25px;
      border-bottom: 0.5px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }

    #m3-row tr:last-child td { border-bottom: none; }

    .m3-group-hdr {
      text-align: center;
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 0 10px;
      height: 18px;
      border-bottom: none !important;
    }

    .m3-group-row th { border-bottom: none; }
    .m3-divider      { border-left: 0.5px solid rgba(255,255,255,0.1) !important; }

    .m3-today-row td             { background: rgba(59,130,246,.05); }
    .m3-today-row td:first-child { border-left: 2px solid #3b82f6; }
    .m3-best-row td              { background: rgba(99,153,34,0.07); }
    .m3-best-row td:first-child  { border-left: 2px solid #22c55e; }

    .rate-high { color: #22c55e; font-weight: 700; }
    .rate-mid  { color: #f59e0b; font-weight: 700; }
    .rate-low  { color: #ef4444; font-weight: 700; }

    #m3-sanity {
      padding: 3px 12px;
      font-size: 9px;
      color: #334155;
      border-top: 0.5px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      background: #0d1017;
    }

    /* ── Shared helpers ─────────────────────────────────────────────────────── */
    .bar-wrap  { display: flex; align-items: center; gap: 8px; }
    .bar-track { flex: 1; height: 4px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; min-width: 50px; }
    .bar-fill  { height: 100%; border-radius: 3px; }
    .bar-fill.green  { background: #22c55e; }
    .bar-fill.yellow { background: #f59e0b; }
    .bar-fill.red    { background: #ef4444; }
    .bar-fill.accent { background: #3b82f6; }
    .bar-pct { font-size: 10px; color: #64748b; min-width: 28px; text-align: right; }

    .chip        { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }
    .chip-green  { background: rgba(34,197,94,.15);  color: #86efac; }
    .chip-yellow { background: rgba(245,158,11,.15); color: #fcd34d; }
    .chip-red    { background: rgba(220,38,38,.15);  color: #fca5a5; }

    #error-banner {
      display: none;
      position: fixed;
      top: 55px; left: 50%; transform: translateX(-50%);
      background: rgba(220,38,38,.1);
      border: 1px solid rgba(220,38,38,.3);
      border-radius: 6px;
      padding: 8px 16px;
      color: #ef4444;
      font-size: 12px;
      z-index: 9999;
      max-width: 500px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ── Row 1: Header (48px) ──────────────────────────────────────────────────── -->
<header id="header">
  <h1 class="hdr-title">Outbound Team Capacity Dashboard</h1>
  <div id="header-book-pill">
    <span class="bp-label">Book today:</span>
    <span class="bp-count" id="pill-count">—</span>
    <span class="bp-unit">meetings</span>
    <div class="bp-sep"></div>
    <span class="bp-detail" id="pill-detail"></span>
  </div>
  <div class="hdr-right">
    <div class="live-ind"><span class="live-dot"></span>&nbsp;LIVE</div>
    <div class="cd-wrap">
      <div class="cd-track"><div class="cd-fill" id="cd-fill"></div></div>
      <span class="cd-text" id="cd-text">60s</span>
    </div>
    <span id="last-updated">—</span>
  </div>
</header>

<!-- ── Row 2: Glance bar (30px) ─────────────────────────────────────────────── -->
<div id="glance-bar">
  <span class="gb-title">This Week</span>
  <span id="wg-content" style="display:contents"></span>
</div>

<!-- ── Row 3: Module 1 bar chart (110px) ────────────────────────────────────── -->
<div id="m1-row">
  <div id="m1-label">
    <span class="badge-m">M1</span>
    <span class="m1-sub">Daily<br>meetings<br>next 10d</span>
  </div>
  <div id="m1-chart-wrap"><canvas id="chart-m1"></canvas></div>
</div>

<!-- ── Row 4: Module 2 heatmap (170px) ──────────────────────────────────────── -->
<div id="m2-row">
  <div class="row-hdr">M2 · Rep Capacity Heat Map · Next 10 Days</div>
  <div id="m2-heatmap"></div>
</div>

<!-- ── Row 5: Module 4 — 4 horizontal cards (80px) ──────────────────────────── -->
<div id="m4-strip">
  <!-- populated by render() -->
</div>

<!-- ── Row 6: Module 3 — full-width hit rate table (1fr) ────────────────────── -->
<div id="m3-row">
  <div class="row-hdr">M3 · Proposal Hit Rate by Days-Out</div>
  <div id="m3-scroll">
    <table>
      <thead>
        <tr class="m3-group-row">
          <th rowspan="2" style="width:90px;vertical-align:bottom">Days Out</th>
          <th colspan="4" class="m3-group-hdr" style="color:#60a5fa">Last 30 days</th>
          <th rowspan="2" style="width:52px;vertical-align:bottom;text-align:center">Trend</th>
          <th colspan="4" class="m3-group-hdr m3-divider" style="color:#334155">Last 90 days</th>
        </tr>
        <tr>
          <th>Mtgs</th><th>Props</th><th>Hit %</th><th>Close %</th>
          <th style="border-left:0.5px solid rgba(255,255,255,0.1)">Mtgs</th>
          <th>Props</th><th>Hit %</th><th>Close %</th>
        </tr>
      </thead>
      <tbody id="m3-combined-table"></tbody>
    </table>
    <div id="m3-sanity"></div>
  </div>
</div>

<!-- Hidden sink — keeps render() null-safe -->
<div style="display:none" aria-hidden="true"><div id="m1-stats"></div></div>

<!-- Error banner -->
<div id="error-banner"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let chartM1 = null;
let countdownInterval = null;
const REFRESH_INTERVAL = 60;
let secondsLeft = REFRESH_INTERVAL;

// ── Cursor hide after 3s inactivity ──────────────────────────────────────────
(function () {
  let timer;
  function show() {
    document.body.style.cursor = '';
    clearTimeout(timer);
    timer = setTimeout(() => { document.body.style.cursor = 'none'; }, 3000);
  }
  document.addEventListener('mousemove', show, { passive: true });
  show();
})();

// ── Utilities ─────────────────────────────────────────────────────────────────
function fmtDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function barColor(pct) {
  if (pct >= 80) return 'green';
  if (pct >= 50) return 'yellow';
  return 'red';
}

function rateClass(rate) {
  if (rate >= 15) return 'rate-high';
  if (rate >= 10) return 'rate-mid';
  return 'rate-low';
}

function makeBar(pct, color) {
  const cls = color || barColor(pct);
  return `<div class="bar-wrap">
    <div class="bar-track"><div class="bar-fill ${cls}" style="width:${Math.min(100,pct)}%"></div></div>
    <span class="bar-pct">${pct}%</span>
  </div>`;
}

function chipFor(pct) {
  if (pct >= 90) return `<span class="chip chip-red">${pct}%</span>`;
  if (pct >= 65) return `<span class="chip chip-yellow">${pct}%</span>`;
  return `<span class="chip chip-green">${pct}%</span>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(data) {

  // ── Glance bar ───────────────────────────────────────────────────────────
  const days      = data.module1.days;
  const todayStr  = data.todayStr;
  const todayData = days.find(d => d.date === todayStr) || {};
  const weekdays10     = days.filter(d => !d.isWeekend);
  const totalBooked10  = weekdays10.reduce((s, d) => s + d.booked, 0);
  const totalCap10     = weekdays10.reduce((s, d) => s + d.capacity, 0);
  const avgFill10      = totalCap10 > 0 ? Math.round((totalBooked10 / totalCap10) * 100) : 0;
  const avgFillColor   = avgFill10 >= 70 ? '#f59e0b' : avgFill10 >= 50 ? '#22c55e' : '#ef4444';

  if (data.thisWeek) {
    const tw = data.thisWeek;
    const fillClr = tw.teamFillPct >= 70 ? '#f59e0b' : tw.teamFillPct >= 50 ? '#22c55e' : '#ef4444';
    const sep = '<span class="wg-sep"></span>';
    document.getElementById('wg-content').outerHTML =
      `<span id="wg-content" style="display:contents">` +
      `<span class="wg-item">Emptiest: <strong style="color:#ef4444">${tw.emptiestRep ? tw.emptiestRep.name + ' (' + tw.emptiestRep.fillPct + '%)' : '—'}</strong></span>${sep}` +
      `<span class="wg-item">Fullest: <strong style="color:#22c55e">${tw.fullestRep ? tw.fullestRep.name + ' (' + tw.fullestRep.fillPct + '%)' : '—'}</strong></span>${sep}` +
      `<span class="wg-item">Team fill: <strong style="color:${fillClr}">${tw.teamFillPct}%</strong> <span style="color:#475569">(${tw.totalBooked}/${tw.totalCapacity})</span></span>${sep}` +
      `<span class="wg-item">Open this week: <strong style="color:#e2e8f0">${tw.openSlots}</strong> slots</span>${sep}` +
      `<span class="wg-item">Today: <strong style="color:#e2e8f0">${todayData.booked ?? 0}/${todayData.capacity ?? data.totalDailyCapacity}</strong></span>${sep}` +
      `<span class="wg-item">10d avg: <strong style="color:${avgFillColor}">${avgFill10}%</strong></span>${sep}` +
      `<span class="wg-item">Reps: <strong style="color:#e2e8f0">${data.outboundRepCount}</strong></span>` +
      `<span class="wg-week">${tw.weekLabel}</span>` +
      `</span>`;
  }

  // ── Module 1 — Bar chart ─────────────────────────────────────────────────
  const labels     = days.map(d => `${fmtDate(d.date)}\n${d.dayOfWeek.slice(0,3)}`);
  const bookedVals = days.map(d => d.booked);
  const capVals    = days.map(d => Math.max(0, d.capacity - d.booked));
  const bgBooked   = days.map(d => {
    if (d.isWeekend) return 'rgba(139,148,158,0.15)';
    const c = barColor(d.fillPct);
    return c === 'green' ? '#22c55e' : c === 'yellow' ? '#f59e0b' : '#ef4444';
  });
  const bgCap = days.map(d => d.isWeekend ? 'rgba(139,148,158,0.05)' : 'rgba(255,255,255,0.06)');

  if (chartM1) chartM1.destroy();
  const ctx = document.getElementById('chart-m1').getContext('2d');
  chartM1 = new Chart(ctx, {
    type: 'bar',
    plugins: [ChartDataLabels],
    data: {
      labels,
      datasets: [
        {
          label: 'Booked', data: bookedVals, backgroundColor: bgBooked, borderRadius: 2, stack: 'stack',
          datalabels: {
            display: (ctx) => { const d = days[ctx.dataIndex]; return !d.isWeekend && d.booked > 0; },
            formatter: (_, ctx) => days[ctx.dataIndex].fillPct + '%',
            color: '#fff', font: { size: 8, weight: 'bold' },
            anchor: 'center', align: 'center',
          }
        },
        {
          label: 'Open', data: capVals, backgroundColor: bgCap, borderRadius: 2, stack: 'stack',
          datalabels: { display: false }
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            afterBody: (items) => {
              const d = days[items[0].dataIndex];
              return [`Fill: ${d.fillPct}%`, `Capacity: ${d.capacity}`];
            }
          }
        }
      },
      scales: {
        x: { stacked: true, ticks: { color: '#475569', font: { size: 9 }, maxRotation: 0 }, grid: { display: false } },
        y: { stacked: true, display: false }
      }
    }
  });

  // ── Module 2 — Heat Map ──────────────────────────────────────────────────
  function hmCellClass(pct, isWeekend) {
    if (isWeekend) return 'weekend-col';
    if (pct === 0)  return 'hm-empty';
    if (pct < 50)   return 'hm-low';
    if (pct < 80)   return 'hm-mid';
    if (pct < 100)  return 'hm-good';
    return 'hm-full';
  }

  (function renderHeatMap() {
    const container = document.getElementById('m2-heatmap');
    const reps = data.module2.reps;
    const days = data.module1.days;

    if (!reps.length) {
      container.innerHTML = '<div style="padding:10px 16px;color:#64748b;font-size:11px">No Outbound Direct reps found</div>';
      return;
    }

    const headerCols = days.map(d => {
      const isToday = d.date === todayStr;
      const label = isToday
        ? `<div style="color:#60a5fa;font-weight:700">Today</div><div>${fmtDate(d.date)}</div><div>${d.dayOfWeek.slice(0,3)}</div>`
        : `<div>${fmtDate(d.date)}</div><div>${d.dayOfWeek.slice(0,3)}</div>`;
      const style = d.isWeekend ? 'opacity:0.2' : '';
      return `<th style="${style}">${label}</th>`;
    }).join('');

    const repRows = reps.map(rep => {
      const cells = rep.days.map((d, i) => {
        const day = days[i];
        const isToday = day.date === todayStr;
        const colorClass = hmCellClass(d.fillPct, d.isWeekend);
        const todayClass = isToday ? ' today-col' : '';
        if (d.isWeekend) return `<td class="hm-cell weekend-col${todayClass}">—</td>`;
        return `<td class="hm-cell ${colorClass}${todayClass}">
          <div class="hm-booking">${d.booked}/${rep.maxPerDay}</div>
          <div class="hm-pct">${d.fillPct}%</div>
        </td>`;
      }).join('');

      const p = rep.totalFillPct;
      const totalColor = p >= 80 ? '#86efac' : p >= 50 ? '#fcd34d' : '#fca5a5';
      return `<tr>
        <td class="rep-name">${rep.name}</td>
        ${cells}
        <td class="hm-total-col" style="color:${totalColor}"><strong>${rep.totalFillPct}%</strong></td>
      </tr>`;
    }).join('');

    container.innerHTML = `
      <table class="heatmap-table">
        <thead>
          <tr>
            <th class="rep-col">Rep</th>
            ${headerCols}
            <th style="border-left:0.5px solid rgba(255,255,255,0.08)">5D AVG<br><span style="color:#475569;font-weight:400;font-size:7px">wkdays</span></th>
          </tr>
        </thead>
        <tbody>${repRows}</tbody>
      </table>`;
  })();

  // ── Header booking pill ──────────────────────────────────────────────────
  (function renderBookingPill() {
    const rec       = data.module3.bookingRec;
    const pill      = document.getElementById('header-book-pill');
    const pillCount = document.getElementById('pill-count');
    const pillDetail= document.getElementById('pill-detail');
    if (!pill || !rec) return;

    if (!rec || rec.optimalCutoff === 0) {
      pillCount.textContent = '—';
      pillDetail.innerHTML  = 'No clear booking window — hit rates below 15% across all days out';
      pill.style.visibility = 'visible';
      return;
    }

    const allFull = rec.meetingsToBook === 0;
    pillCount.textContent = allFull ? '✓' : rec.meetingsToBook;
    pillDetail.innerHTML  = allFull
      ? `All slots filled through day ${rec.optimalCutoff}`
      : `Next <strong>${rec.optimalCutoff} days</strong> (${rec.windowStr})`
        + ` &nbsp;·&nbsp; Best: <strong>${rec.bestDaysOut} day${rec.bestDaysOut > 1 ? 's' : ''} out</strong>`
        + ` — ${rec.bestHitRate}% proposal · ${rec.bestCloseRate}% close`;
    pill.style.visibility = 'visible';
  })();

  // ── Module 4 — 4 horizontal cards ───────────────────────────────────────
  const m4strip = document.getElementById('m4-strip');
  const m4rows  = data.module4.meetingsNeeded.filter(r => [2, 5, 7, 10].includes(r.horizon));

  m4strip.innerHTML = m4rows.map(r => {
    const isFull    = r.openSlots <= 0;
    const bookedPct = r.totalCapacity > 0 ? Math.round((r.totalBooked / r.totalCapacity) * 100) : 0;
    const openPct   = r.totalCapacity > 0 ? (r.openSlots / r.totalCapacity) * 100 : 0;
    const barColor  = isFull ? '#22c55e' : '#3b82f6';

    const slotsCls  = isFull ? 'good' : openPct > 50 ? 'critical' : openPct > 20 ? 'warn' : 'good';
    const slotsHtml = isFull
      ? `<div class="m4-open-num good">✓</div>`
      : `<div class="m4-open-num ${slotsCls}">${r.openSlots < 0 ? '⚠' + Math.abs(r.openSlots) : r.openSlots}</div>`;

    let badgeHtml;
    if (r.openSlots <= 0) {
      badgeHtml = `<span class="m4-badge badge-good">✅ Full</span>`;
    } else if (openPct < 20) {
      badgeHtml = `<span class="m4-badge badge-good">✅ Nearly full</span>`;
    } else if (openPct <= 50) {
      badgeHtml = `<span class="m4-badge badge-warn">⚠️ Book ${r.openSlots}</span>`;
    } else {
      badgeHtml = `<span class="m4-badge badge-critical">🔴 Book ${r.openSlots}</span>`;
    }

    const wkTag = r.hasWeekend
      ? ` <span style="font-size:8px;color:#475569;background:rgba(139,148,158,.1);border:0.5px solid rgba(139,148,158,.25);border-radius:8px;padding:1px 4px">+wknd</span>` : '';

    return `<div class="m4-card">
      <div class="m4-card-top">
        <span class="m4-horizon">Next ${r.horizon}d${wkTag}</span>
        <span class="m4-dayrange">${r.firstDayName}–${r.lastDayName}</span>
      </div>
      <div class="m4-card-mid">
        ${slotsHtml}
        <div class="m4-fill-col">
          <div class="m4-fill-label">${r.totalBooked}/${r.totalCapacity} &nbsp;<strong style="color:#e2e8f0">${bookedPct}%</strong> filled</div>
          <div class="m4-fill-bar-track"><div class="m4-fill-bar" style="width:${Math.min(100,bookedPct)}%;background:${barColor}"></div></div>
        </div>
        ${badgeHtml}
      </div>
    </div>`;
  }).join('');

  // ── Module 3 — combined 30d / 90d hit rate table ─────────────────────────
  (function renderCombinedHitTable() {
    const b30   = data.module3.hitRate30;
    const b90   = data.module3.hitRate90;
    const rec   = data.module3.bookingRec;
    const tbody = document.getElementById('m3-combined-table');

    tbody.innerHTML = b30.map((b, i) => {
      const c = b90[i];
      const isCutoff  = rec && b.daysOut === rec.optimalCutoff && rec.optimalCutoff > 0;
      const isDropoff = rec && rec.optimalCutoff > 0 && b.daysOut > rec.optimalCutoff;
      const isBest    = rec && b.daysOut === rec.bestDaysOut && b.total > 0 && !isDropoff;

      const rowStyle  = isDropoff ? 'background:rgba(220,38,38,0.04);'
                      : isBest    ? 'background:rgba(99,153,34,0.07);' : '';
      const rowBorder = isCutoff  ? 'border-bottom:2px dashed rgba(34,197,94,.4);' : '';
      const rowClass  = isBest    ? 'm3-best-row' : '';

      const daysLabel = `${b.daysOut} day${b.daysOut > 1 ? 's' : ''} out`;
      let daysOutCell;
      if (isCutoff) {
        daysOutCell = `<td style="padding:0 10px">
          <div>${daysLabel}</div>
          <div style="font-size:8.5px;color:#22c55e;font-weight:700;letter-spacing:.04em">◀ OPTIMAL</div>
        </td>`;
      } else if (isDropoff) {
        daysOutCell = `<td style="padding:0 10px;opacity:.65">
          <div>${daysLabel}</div>
          <div style="font-size:8.5px;color:#1e293b">drop-off</div>
        </td>`;
      } else {
        daysOutCell = `<td>${daysLabel}${isBest ? ' <span style="font-size:9px;color:#22c55e;font-weight:600">★</span>' : ''}</td>`;
      }

      const rate30 = b.total === 0 ? '—' : `<span class="${rateClass(b.hitRate)}">${b.hitRate}%</span>`;
      const rate90 = c.total === 0 ? '—' : `<span class="${rateClass(c.hitRate)}">${c.hitRate}%</span>`;

      function closeRateCell(bucket) {
        if (bucket.proposals === 0) return '—';
        const small    = bucket.proposals < 5;
        const cls      = small ? '' : rateClass(bucket.closeRate);
        const color    = small ? 'color:#64748b' : '';
        const label    = small ? `~${bucket.closeRate}%` : `${bucket.closeRate}%`;
        const title    = small ? ` title="Small sample (${bucket.proposals} prop)"` : '';
        const asterisk = small ? ` <span style="color:#64748b;font-size:9px"${title}>*</span>` : '';
        return `<span class="${cls}" style="${color}"${title}>${label}</span>${asterisk}`;
      }

      const diff = b.hitRate - c.hitRate;
      let trendCell;
      if (b.total === 0 || c.total === 0 || Math.abs(diff) <= 1) {
        trendCell = '<span style="color:#2d3748">—</span>';
      } else if (diff > 0) {
        trendCell = `<span style="color:#22c55e">▲ +${diff}%</span>`;
      } else {
        trendCell = `<span style="color:#ef4444">▼ ${diff}%</span>`;
      }

      return `<tr class="${rowClass}" style="${rowStyle}${rowBorder}">
        ${daysOutCell}
        <td>${b.total}</td>
        <td>${b.proposals}</td>
        <td>${rate30}</td>
        <td>${closeRateCell(b)}</td>
        <td style="text-align:center">${trendCell}</td>
        <td style="border-left:0.5px solid rgba(255,255,255,0.1)">${c.total}</td>
        <td>${c.proposals}</td>
        <td>${rate90}</td>
        <td>${closeRateCell(c)}</td>
      </tr>`;
    }).join('');

    const s       = data.module3.sanity30;
    const sanityEl = document.getElementById('m3-sanity');
    if (sanityEl && s) {
      sanityEl.innerHTML = `Last 30d: <strong style="color:#94a3b8">${s.proposals}</strong> proposals &nbsp;·&nbsp; <strong style="color:#94a3b8">${s.closes}</strong> closes &nbsp;·&nbsp; <strong style="color:#94a3b8">${s.blendedCloseRate}%</strong> blended close rate`;
    }
  })();
}

// ── Fetch & display ───────────────────────────────────────────────────────────
async function fetchData(forceRefresh = false) {
  const errBanner = document.getElementById('error-banner');
  try {
    const url  = '/api/data' + (forceRefresh ? '?refresh=1' : '');
    const res  = await fetch(url);
    const data = await res.json();

    errBanner.style.display = 'none';

    if (data.error) {
      errBanner.textContent = 'Warning: ' + data.error;
      errBanner.style.display = 'block';
    }

    if (!data.todayStr) {
      setTimeout(() => fetchData(false), 3000);
      return;
    }

    render(data);

    const ts = data.generatedAt
      ? new Date(data.generatedAt).toLocaleTimeString()
      : new Date().toLocaleTimeString();
    document.getElementById('last-updated').textContent = ts;

  } catch (err) {
    errBanner.textContent = 'Failed to fetch data: ' + err.message;
    errBanner.style.display = 'block';
  }
}

// ── Countdown ─────────────────────────────────────────────────────────────────
function resetCountdown() {
  secondsLeft = REFRESH_INTERVAL;
  updateCountdownUI();
}

function updateCountdownUI() {
  const pct  = (secondsLeft / REFRESH_INTERVAL) * 100;
  const fill = document.getElementById('cd-fill');
  const text = document.getElementById('cd-text');
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = secondsLeft + 's';
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    secondsLeft--;
    updateCountdownUI();
    if (secondsLeft <= 0) {
      resetCountdown();
      fetchData(false);
    }
  }, 1000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
fetchData(false);
startCountdown();
</script>
</body>
</html>
